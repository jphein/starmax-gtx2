[pytest]
# Offline integration tests: the gtx2 custom-component (pure-logic, contract, LZ4 render seam), the
# MQTT bridge (faces byte-parity, dispatch, catalog, blobserver, registry, metrics), and HA package
# + dashboard structure. Home Assistant is NOT required — a conftest shim imports the component's
# pure-logic modules without executing its HA-heavy __init__. `pythonpath` puts the repo root (for
# custom_components), the client library, and the bridge on sys.path with no install step.
# The standalone BLE client has its own suite: `cd client && pytest`.
testpaths = tests
addopts = -q
pythonpath = . client bridge
