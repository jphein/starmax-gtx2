# =============================================================================
# openocd-cmsis-dap.cfg — generic Cortex-M33 (Actions ATS3085S4) via CMSIS-DAP
# =============================================================================
# CMSIS-DAP is the PREFERRED probe for a non-vendor M33 target: raw SWD DAP,
# adjustable speed, reliable SRST. (J-Link is equally good — swap the driver
# line for `adapter driver jlink`.) OpenOCD 0.12.0.
#
# Run from THIS directory so `[find openocd-common.cfg]` resolves via `-s .`.
#
#   # R1 — prove SWD present & not fused:
#   openocd -s . -f openocd-cmsis-dap.cfg -c "init; r1_probe; shutdown"
#
#   # R2 — dump the memory-mapped NOR (core must run past mbrec FIRST):
#   openocd -s . -f openocd-cmsis-dap.cfg \
#       -c "init; reset run" \
#       -c "sleep 2000; dump_nor_xip golden_swd_1.bin; shutdown"
#   # ...then run it again to golden_swd_2.bin and `cmp` (see runbook R2).
# =============================================================================

adapter driver cmsis-dap
# If multiple CMSIS-DAP probes are attached, pin one:
# adapter serial <SERIAL>

transport select swd

source [find openocd-common.cfg]
