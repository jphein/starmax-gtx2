# =============================================================================
# openocd-common.cfg — generic Cortex-M33 bring-up for Actions ATS3085S4
# =============================================================================
# Shared by openocd-cmsis-dap.cfg and openocd-stlink.cfg. DO NOT run directly
# (it does not select an adapter/transport — the adapter file does that first).
#
# The ATS3085(S4) is NOT a built-in OpenOCD target, so we attach a *generic*
# Cortex-M target over a raw SWD DAP (no vendor pack/flash-driver needed).
# Tested against: OpenOCD 0.12.0.
#
# The adapter .cfg must, BEFORE sourcing this file:
#   1. select the adapter driver (cmsis-dap | st-link)
#   2. `transport select <swd | dapdirect_swd>`
# =============================================================================

# --- Generic SWD DAP + Cortex-M target (no CMSIS pack required) --------------
source [find target/swj-dp.tcl]

set _CHIPNAME ats3085
# -expected-id 0  => accept ANY DPIDR. We are *probing*; we don't know it yet
# and we explicitly do not want a mismatch to abort the connect.
swj_newdap $_CHIPNAME cpu -expected-id 0
dap create  $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
target create $_CHIPNAME.cpu cortex_m -dap $_CHIPNAME.dap

# --- Reset handling ----------------------------------------------------------
# connect-under-reset: assert nRESET (SRST) *during* the initial connect so we
# catch the core before mbrec runs. This is what proves SWD is truly reachable
# and not gated/fused-off, independent of whatever the firmware does at boot.
# Requires an nRESET pad wired to the probe's SRST line.
#   srst_only           : we drive SRST, not TRST
#   srst_nogate         : SRST must NOT also gate the SWD/DAP (M33 keeps DAP up)
#   connect_assert_srst : hold SRST asserted across the connect
reset_config srst_only srst_nogate connect_assert_srst
# --- If NO nRESET pad is broken out, comment the line above and use: ---------
# reset_config none
#   then connect to a free-running core (see dump_nor_xip — that path does NOT
#   need reset anyway). You lose the strongest "is-it-fused" signal but can
#   still read IDCODE/CPUID from a running part.

adapter speed 1000   ;# 1 MHz — safe start. Raise (4000/8000) once stable.

# --- NOR facts (from SDK board_cfg.h + FCC + datasheet) ----------------------
# CONFIG_SPI_XIP_READ; CONFIG_SPI_XIP_VADDR = 0x12000000  ("max 32MB xip read")
# XT25F128F = 16 MiB. The board's CONFIG_SPI_FLASH_CHIP_SIZE (0x2000000/32 MiB)
# is the *reference* chip; the SHIPPING part is 16 MiB — NEVER read past it.
set NOR_XIP_BASE 0x12000000
set NOR_SIZE     0x1000000   ;# 16 MiB (XT25F128F). 16777216 bytes exactly.

# =============================================================================
# Helper procs — call from the -c command line, or the telnet console (:4444).
# =============================================================================

# --- R1: prove SWD present & not fused --------------------------------------
# `init` (run by the adapter cfg / your -c line) already reads & prints the
# DPIDR; if the DAP does not answer, init aborts here — that itself is the
# "SWD dead/fused" signal. This proc adds a positive M33 confirmation.
proc r1_probe {} {
    targets
    halt
    echo "== SCB CPUID @0xE000ED00 — Cortex-M33 => 0x41.FD21. (part id 0xD21) =="
    mdw 0xE000ED00
    echo "== core registers (proves the core actually halted) =="
    reg pc
    reg xpsr
    echo ""
    echo "== R1 PASS iff: (a) init printed a DPIDR (Arm M33 DP ~0x6ba02477),"
    echo "   (b) CPUID above shows part 0xD21, (c) core halted."
    echo "== R1 FAIL (SWD fused/absent): init could not read DPIDR / no DAP."
    echo "   -> fall through to the external CH341A NOR route (runbook R2/R3)."
}

# --- R2 (SWD path 2a): dump the memory-mapped NOR via the XIP window ---------
# PRECONDITION: the SoC must ALREADY have configured the SPI0 XIP cache, i.e.
# mbrec has RUN. So do NOT hold in reset for this — attach to a free-running
# core (or `reset run`, wait ~2 s, then halt), THEN dump.
#   Read gives the *logical* NOR view. With enable_encryption=false (reference
#   firmware.xml, all partitions) this equals the raw die bytes. If the shipping
#   unit encrypts/scrambles, XIP != raw — cross-check against a CH341A raw read.
proc dump_nor_xip {fname} {
    global NOR_XIP_BASE NOR_SIZE
    halt
    echo "Sanity — first 16 bytes at XIP base (expect a real mbrec header,"
    echo "NOT all 0xFF / 0x00; cross-check vs CH341A dump offset 0x0):"
    mdb $NOR_XIP_BASE 16
    echo "Dumping 16 MiB from $NOR_XIP_BASE -> $fname (slow over SWD; be patient)"
    dump_image $fname $NOR_XIP_BASE $NOR_SIZE
    echo "DONE. Discipline: dump TWICE, 'cmp' the two files, confirm size ="
    echo "16777216 bytes, keep multiple OFF-DEVICE copies as golden.bin."
}

# NOTE ON WRITE (R3 restore): OpenOCD has NO flash driver for the Actions SPIC
# controller, and the XIP window is READ-ONLY (a cache — you cannot program NOR
# through it). So a golden.bin *restore write* over SWD is NOT available out of
# the box: it would require a custom RAM flash-loader for the ATS3085 SPI-NOR
# controller (register map not in the public SDK headers). The reliable restore
# path is the external CH341A programmer (or ADFU). See runbook R3.
