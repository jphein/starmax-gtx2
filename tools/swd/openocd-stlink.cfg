# =============================================================================
# openocd-stlink.cfg — generic Cortex-M33 (Actions ATS3085S4) via ST-Link
# =============================================================================
# IMPORTANT: to drive a *generic* (non-STM32) target we MUST use the ST-Link
# "dapdirect" driver (interface/stlink-dap.cfg), NOT the default HLA driver
# (interface/stlink.cfg). HLA (hla_swd) only talks to a *known* hla_target and
# cannot `dap create` a generic core — it will not work here.
#
#   dapdirect_swd needs ST-Link V2 firmware >= V2J24, or ST-Link V2-1 / V3.
#   Older V2 clones stuck on HLA CANNOT do this — use a CMSIS-DAP/J-Link probe
#   instead (see openocd-cmsis-dap.cfg). ST-Link SRST control is also weaker;
#   if connect-under-reset misbehaves, switch to CMSIS-DAP or set
#   `reset_config none` in openocd-common.cfg and attach to a running core.
#
# OpenOCD 0.12.0. Run from THIS directory (so `-s .` resolves the source).
#
#   # R1 — prove SWD present & not fused:
#   openocd -s . -f openocd-stlink.cfg -c "init; r1_probe; shutdown"
#
#   # R2 — dump the memory-mapped NOR (core must run past mbrec FIRST):
#   openocd -s . -f openocd-stlink.cfg \
#       -c "init; reset run" \
#       -c "sleep 2000; dump_nor_xip golden_swd_1.bin; shutdown"
# =============================================================================

source [find interface/stlink-dap.cfg]   ;# sets: adapter driver st-link
transport select dapdirect_swd

source [find openocd-common.cfg]
